<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quiz Result</title>

    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="result-container">

        <h1>Quiz Result</h1>

        <div class="score-box">
            <h2>Your Score</h2>
            <p id="score">0 / 10</p>
        </div>

        <div class="status" id="status">
            Result Status
        </div>

        <button onclick="showResult()" class="btn">
            Show Result
        </button>

        <div class="home-link">
            <a href="/">Go To Home</a>
        </div>

    </div>

    <script src="script.js"></script>

</body>
</html>
