{% load static %}
<!doctype html>
<html lang="en" data-theme="light">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="description" content="LearnSphere is a modern online learning portal for career-ready courses, mentors, and guided learning paths.">
  <title>{% block title %}LearnSphere | Online Learning Portal{% endblock %}</title>
  <link rel="preconnect" href="https://cdn.jsdelivr.net">
  <link rel="preconnect" href="https://cdnjs.cloudflare.com">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" rel="stylesheet">
  <link rel="stylesheet" href="{% static 'css/animations.css' %}">
  <link rel="stylesheet" href="{% static 'css/style.css' %}">
  <link rel="stylesheet" href="{% static 'css/responsive.css' %}">
</head>
<body>
  <div id="pageLoader" class="page-loader" aria-label="Loading page">
    <div class="loader-mark"><span></span><span></span><span></span></div>
  </div>

  {% include 'navbar.html' %}

  <main class="page-shell">
    {% block content %}{% endblock %}
  </main>

  {% include 'footer.html' %}

  <button class="back-to-top" id="backToTop" type="button" aria-label="Back to top">
    <i class="fa-solid fa-arrow-up"></i>
  </button>

  <div class="toast-container position-fixed bottom-0 end-0 p-3">
    <div id="appToast" class="toast glass-toast" role="status" aria-live="polite" aria-atomic="true">
      <div class="toast-header">
        <i class="fa-solid fa-circle-check text-success me-2"></i>
        <strong class="me-auto">LearnSphere</strong>
        <small>Now</small>
        <button type="button" class="btn-close" data-bs-dismiss="toast" aria-label="Close"></button>
      </div>
      <div class="toast-body">Action completed successfully.</div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="{% static 'js/animations.js' %}"></script>
  <script src="{% static 'js/validation.js' %}"></script>
  <script src="{% static 'js/main.js' %}"></script>
  {% block extra_js %}{% endblock %}
</body>
</html>
