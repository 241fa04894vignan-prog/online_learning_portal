{% extends "base.html" %}

{% block content %}
<div class="container py-5">
  <div class="row justify-content-center">
    <div class="col-md-6">
      <h1 class="h3 mb-4">Change Password</h1>
      <form method="post" novalidate>
        {% csrf_token %}
        {{ form.as_p }}
        <button class="btn btn-primary" type="submit">Update password</button>
      </form>
    </div>
  </div>
</div>
{% endblock %}
